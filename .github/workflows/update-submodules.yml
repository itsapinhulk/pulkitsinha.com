name: Update Submodules

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1
          lfs: true

      - run: git lfs pull

      - name: git status check
        run: git status
        
      - uses: itsapinhulk/git-submodules-upgrade@v3
        with:
          reviewer: itsapinhulk
