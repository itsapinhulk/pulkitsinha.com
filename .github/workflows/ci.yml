name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Check analytics inclusion
        run: ./scripts/check-analytics.sh

      - uses: oven-sh/setup-bun@v2

      - name: Build
        run: ./scripts/build.sh
        env:
          HOME_BASE_URL: pulkitsinha.com
          PROJECTS_BASE_URL: projects.pulkitsinha.com
