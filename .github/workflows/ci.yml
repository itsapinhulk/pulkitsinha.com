name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd web/home && bun install
          cd ../../web/projects && bun install

      - name: Build
        run: ./scripts/build.sh

      - name: Check analytics inclusion
        run: ./scripts/check-analytics.sh
